name: Deploy to InfinityFree (PHP Server)

on:
  push:
    branches:
      - main
      - master # Triggers on both main or master branches

jobs:
  web-deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4
      
      - name: 📂 Sync files (Upload to htdocs)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # InfinityFree ke server par files andar 'htdocs' me jati hain
          server-dir: /htdocs/
