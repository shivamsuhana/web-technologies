<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Form & Data Table (Experiment 7)</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="light">
  <div class="glass-container">
    <header>
      <h1>Data Collector Pro</h1>
      <p>Submit your details below and manage your records.</p>
    </header>

    <div class="layout">
      <!-- Form Section -->
      <section class="form-section">
        <form id="myForm">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required placeholder="John Doe">
          </div>

          <div class="form-group">
            <label>Role</label>
            <div class="radio-group">
              <label class="custom-radio">
                <input type="radio" name="role" value="Developer" required>
                <span>Developer</span>
              </label>
              <label class="custom-radio">
                <input type="radio" name="role" value="Designer">
                <span>Designer</span>
              </label>
            </div>
          </div>

          <div class="form-group">
            <label>Skills</label>
            <div class="checkbox-group">
              <label class="custom-checkbox">
                <input type="checkbox" name="skills" value="HTML">
                <span>HTML</span>
              </label>
              <label class="custom-checkbox">
                <input type="checkbox" name="skills" value="CSS">
                <span>CSS</span>
              </label>
              <label class="custom-checkbox">
                <input type="checkbox" name="skills" value="JS">
                <span>JavaScript</span>
              </label>
            </div>
          </div>

          <div class="form-group">
            <label for="theme">UI Theme</label>
            <select name="theme" id="theme">
              <option value="light">Light Mode</option>
              <option value="dark">Dark Mode</option>
            </select>
          </div>

          <button type="submit" class="submit-btn">
            <span>Submit Data</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </form>
      </section>

      <!-- Table Section -->
      <section class="data-section">
        <div class="table-actions">
          <h2>Recorded Data</h2>
          <div class="action-buttons">
            <button type="button" id="copy-btn" class="icon-btn" title="Copy to Clipboard">
              📋 Copy
            </button>
            <button type="button" id="download-btn" class="icon-btn" title="Download CSV">
              💾 CSV
            </button>
          </div>
        </div>
        
        <div class="table-wrapper">
          <table id="data-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Role</th>
                <th>Skills</th>
                <th>Theme</th>
                <th>Time</th>
              </tr>
            </thead>
            <tbody>
              <!-- Data rows injected here -->
            </tbody>
          </table>
          <div id="empty-state">No data recorded yet.</div>
        </div>
      </section>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
